<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0}body{background:transparent;overflow:hidden;width:180px;height:180px;-webkit-app-region:drag;user-select:none}
</style></head><body>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';
var S=180,dpr=Math.min(window.devicePixelRatio,2);
var r=new THREE.WebGLRenderer({alpha:true,antialias:true});r.setSize(S*dpr,S*dpr);r.setPixelRatio(dpr);
r.domElement.style.cssText='width:180px;height:180px';
document.body.appendChild(r.domElement);
var scene=new THREE.Scene();
var cam=new THREE.PerspectiveCamera(40,1,0.1,20);cam.position.set(0,0.8,4);cam.lookAt(0,0.2,0);
scene.add(new THREE.AmbientLight('#fff5ee',3));
scene.add(new THREE.DirectionalLight('#ffffff',3)).position.set(2,4,3);

var bCol='#F5B87A',eCol='#D49555',wCol='#FFFAF5';
var headG=new THREE.SphereGeometry(0.95,32,32);headG.scale(1,0.92,0.72);
var head=new THREE.Mesh(headG,new THREE.MeshStandardMaterial({color:bCol,roughness:0.4}));
head.position.y=0.12;scene.add(head);
var snout=new THREE.Mesh(new THREE.SphereGeometry(0.45,24,24),new THREE.MeshStandardMaterial({color:wCol,roughness:0.35}));
snout.position.set(0,-0.18,0.58);snout.scale.set(1,0.65,0.55);scene.add(snout);
function ear(x){var g=new THREE.SphereGeometry(0.28,16,16);g.scale(1,0.75,0.55);var e=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:eCol}));e.position.set(x,0.5,0.1);e.rotation.z=x>0?-0.5:0.5;e.rotation.x=-0.5;scene.add(e);var gi=new THREE.SphereGeometry(0.17,12,12);gi.scale(1,0.75,0.5);var ei=new THREE.Mesh(gi,new THREE.MeshStandardMaterial({color:'#FFD8E0'}));ei.position.set(x*0.85,0.47,0.18);ei.rotation.z=x>0?-0.45:0.45;ei.rotation.x=-0.45;scene.add(ei)}ear(-0.52);ear(0.52);
function eye(x){var g=new THREE.SphereGeometry(0.19,20,20);g.scale(1,1.15,0.45);var e=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:'#1a1a2e',roughness:0.03}));e.position.set(x,0.05,0.65);e.rotation.z=x>0?-0.08:0.08;scene.add(e);var h=new THREE.Mesh(new THREE.SphereGeometry(0.065,8,8),new THREE.MeshBasicMaterial({color:'#fff'}));h.position.set(x+0.05,0.12,0.72);scene.add(h);var h2=new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6),new THREE.MeshBasicMaterial({color:'#fff'}));h2.position.set(x-0.06,0.08,0.7);scene.add(h2)}eye(-0.24);eye(0.24);
var nose=new THREE.Mesh(new THREE.ConeGeometry(0.07,0.06,3).rotateX(Math.PI),new THREE.MeshStandardMaterial({color:'#FFA0A0',roughness:0.2}));nose.position.set(0,-0.2,0.75);scene.add(nose);
var mouth=new THREE.Mesh(new THREE.TorusGeometry(0.045,0.012,6,12,Math.PI),new THREE.MeshBasicMaterial({color:'#998888'}));mouth.position.set(0,-0.3,0.7);scene.add(mouth);
function blush(x){var g=new THREE.SphereGeometry(0.1,8,8);g.scale(0.9,0.5,0.2);var b=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:'#FFB0B0',transparent:true,opacity:0.35}));b.position.set(x,-0.05,0.6);scene.add(b)}blush(-0.38);blush(0.38);
var bodyG=new THREE.SphereGeometry(0.55,24,24);bodyG.scale(1,1.15,0.6);
var body=new THREE.Mesh(bodyG,new THREE.MeshStandardMaterial({color:bCol,roughness:0.4}));
body.position.y=-0.65;scene.add(body);
var bo=new THREE.Mesh(new THREE.SphereGeometry(0.35,16,16),new THREE.MeshStandardMaterial({color:wCol}));bo.position.set(0,-0.65,0.3);bo.scale.set(1,1.1,0.5);scene.add(bo);
var tailCrv=new THREE.CubicBezierCurve3(new THREE.Vector3(-0.3,-0.7,-0.2),new THREE.Vector3(-0.8,-0.5,-0.4),new THREE.Vector3(-1,-0.1,-0.2),new THREE.Vector3(-0.5,0.2,0));
var tail=new THREE.Mesh(new THREE.TubeGeometry(tailCrv,16,0.06,8,false),new THREE.MeshStandardMaterial({color:bCol,roughness:0.4}));scene.add(tail);
function paw(x,z){var g=new THREE.SphereGeometry(0.1,8,8);g.scale(1.3,0.35,0.9);var p=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:bCol}));p.position.set(x,-1.05,z);scene.add(p)}paw(-0.2,0.2);paw(0.2,0.2);paw(-0.18,-0.15);paw(0.18,-0.15);

(function anim(t){requestAnimationFrame(anim);
  body.scale.y=1.15+Math.sin(t*0.004)*0.03;
  tail.rotation.z=Math.sin(t*0.005)*0.5+0.1;
  tail.rotation.x=Math.cos(t*0.005)*0.35;
  cam.position.x=Math.sin(t*0.0008)*0.4;
  cam.position.y=0.8+Math.sin(t*0.002)*0.08;
  cam.lookAt(0,0.2,0);
  r.render(scene,cam);
})();

document.body.addEventListener('dblclick',function(e){
  e.stopPropagation();
  try{require('electron').ipcRenderer.send('pet-restore')}catch(ex){}
});
</script>
</body></html>
