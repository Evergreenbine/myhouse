<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#x79DF;&#x623F;&#x7BA1;&#x7406;&#x7CFB;&#x7EDF;</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#3370FF;--blue-hover:#2860E0;--blue-light:#E8F0FF;
  --sidebar-bg:#EEF5FF;--sidebar-hover:#E4EEFF;
  --content-bg:#F6F8FC;
  --red:#F54A45;--red-light:#FFF0EF;
  --green:#34C759;--green-light:#E8F9ED;
  --orange:#FF9500;--orange-light:#FFF5E6;
  --text:#1F2329;--text-sec:#646A73;--text-third:#8F959E;
  --border:#DDE3EA;--border-light:#E8EDF5;
  --bg:#F5F7FB;--bg-hover:#EEF3FA;
  --white:#FFFFFF;
  --radius:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--content-bg);color:var(--text);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh}

/* Top bar */
#top-bar{display:flex;align-items:center;padding:0 24px;background:var(--white);border-bottom:1px solid var(--border-light);gap:0;flex-shrink:0;height:56px;box-shadow:0 1px 2px rgba(31,35,41,0.03);z-index:2}
#app-title{font-size:16px;font-weight:600;color:var(--text);width:184px;margin-right:0;letter-spacing:-0.2px}
.spacer{flex:1}

/* Section tabs */
.section-tab{padding:16px 24px;cursor:pointer;font-size:14px;color:var(--text-sec);border-bottom:2px solid transparent;transition:all 0.2s ease;position:relative;top:1px}
.section-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.section-tab:hover{color:var(--blue);background:#F7FAFF}

/* Content */
#content{flex:1;overflow:hidden;display:flex;background:var(--content-bg)}
.section-page{display:none;flex:1;overflow:hidden}
.section-page.active{display:flex}

/* Sidebar */
#sidebar,#sidebar-rent{width:208px;background:var(--sidebar-bg);border-right:1px solid #DBE8FA;flex-shrink:0;overflow-y:auto;padding:14px 10px}
.side-item{padding:10px 14px;cursor:pointer;font-size:13px;color:#3B4A61;transition:all 0.15s ease;display:flex;align-items:center;gap:8px;border-radius:8px;margin:2px 0;position:relative}
.side-item:hover{background:var(--sidebar-hover);color:var(--text)}
.side-item.active{background:var(--white);color:var(--blue);font-weight:600;box-shadow:0 2px 8px rgba(51,112,255,0.12)}
.side-item.active::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:2px;background:var(--blue)}

/* Main content */
#main-content,#main-content-rent{flex:1;overflow-y:auto;margin:16px 18px;padding:24px 28px;background:var(--white);border:1px solid var(--border-light);border-radius:10px;box-shadow:var(--shadow-sm)}

/* Buttons */
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s ease;line-height:20px}
.btn-primary{background:var(--blue);color:white}.btn-primary:hover{background:var(--blue-hover)}
.btn-outline{background:var(--white);border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg);border-color:#C5C8CC}
.btn-danger{background:var(--red);color:white}.btn-danger:hover{opacity:0.9}
.btn-success{background:var(--green);color:white}.btn-success:hover{opacity:0.9}
.btn-sm{padding:4px 12px;font-size:12px;line-height:18px}

/* Forms */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text-sec);margin-bottom:6px;font-weight:400}
input[type="text"],input[type="number"],select,textarea{height:36px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-size:14px;outline:none;width:100%;background:var(--white);transition:all 0.2s;color:var(--text)}
textarea{height:auto;padding:8px 12px;resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,0.15)}
input::placeholder{color:#BBBFC4}
input[type="date"],input[type="month"]{height:36px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-size:14px;outline:none;background:var(--white);cursor:pointer;color:var(--text);font-family:inherit}
input[type="date"]:focus,input[type="month"]:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(51,112,255,0.15)}
input[type="date"]::-webkit-calendar-picker-indicator,input[type="month"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:0.5;transition:opacity 0.2s}
input[type="date"]:hover::-webkit-calendar-picker-indicator,input[type="month"]:hover::-webkit-calendar-picker-indicator{opacity:0.8}
.soft-input{height:38px;border:1px solid #DDE6F2;border-radius:8px;padding:0 12px;font-size:14px;outline:none;width:100%;background:#F8FAFD;color:var(--text);box-shadow:inset 0 1px 2px rgba(31,35,41,0.02);transition:all 0.2s;appearance:none;-webkit-appearance:none}
.soft-input:focus{background:var(--white);border-color:var(--blue);box-shadow:0 0 0 3px rgba(51,112,255,0.12)}
.soft-form{padding-top:2px}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.toolbar-divider{height:1px;background:#E4EBF5;margin:-4px 0 16px}
.list-meta{font-size:12px;color:var(--text-third);padding:10px 2px 0;text-align:right}
.name-link{color:var(--blue);font-weight:600;cursor:pointer}
.name-link:hover{text-decoration:underline}
.tab-action-row{display:flex;align-items:flex-start;gap:18px;border-bottom:1px solid var(--border-light);margin-bottom:16px}
.entity-action-row{display:flex;align-items:center;justify-content:flex-end;border-bottom:1px solid var(--border-light);padding-bottom:12px;margin-bottom:16px}
.building-tabs{display:flex;gap:26px;overflow-x:auto;flex:1;min-width:0}
.building-tab{appearance:none;-webkit-appearance:none;border:none;background:transparent;color:var(--text-sec);padding:0 0 10px;font-size:14px;line-height:20px;cursor:pointer;white-space:nowrap;transition:all 0.15s ease;border-bottom:2px solid transparent;font-family:inherit}
.building-tab:hover{color:var(--blue)}
.building-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle}
.status-dot.rented{background:var(--green)}
.status-dot.idle{background:#C9CDD4}
.status-cell{text-align:center;width:72px}
.custom-select{position:relative}
.select-trigger{height:38px;border:1px solid #DDE6F2;border-radius:8px;padding:0 34px 0 12px;background:#F8FAFD;color:var(--text);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:14px;box-shadow:inset 0 1px 2px rgba(31,35,41,0.02);transition:all 0.2s}
.select-trigger:hover{background:var(--white);border-color:#C9D8FF}
.select-trigger::after{content:"";position:absolute;right:14px;top:15px;width:7px;height:7px;border-right:1.5px solid var(--text-third);border-bottom:1.5px solid var(--text-third);transform:rotate(45deg)}
.select-menu{display:none;position:absolute;left:0;right:0;top:42px;background:var(--white);border:1px solid var(--border-light);border-radius:8px;box-shadow:var(--shadow-md);padding:6px;z-index:1001;max-height:180px;overflow-y:auto}
.custom-select.open .select-menu{display:block}
.select-option{padding:8px 10px;border-radius:6px;font-size:14px;cursor:pointer;color:var(--text)}
.select-option:hover{background:#F7FAFF;color:var(--blue)}
.select-option.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.locked-field{height:38px;border:1px solid #E2E8F2;border-radius:8px;padding:0 12px;background:#F8FAFD;color:var(--text-sec);display:flex;align-items:center;font-size:14px}
.status-switch-row{display:flex;align-items:center;gap:12px}
.status-switch{width:46px;height:26px;border:none;border-radius:999px;background:#C9CDD4;position:relative;cursor:pointer;transition:all 0.2s}
.status-switch::after{content:"";position:absolute;width:22px;height:22px;left:2px;top:2px;background:var(--white);border-radius:50%;box-shadow:0 1px 3px rgba(31,35,41,0.22);transition:all 0.2s}
.status-switch.rented{background:var(--green)}
.status-switch.rented::after{left:22px}
.status-switch-label{font-size:13px;color:var(--text-sec)}

/* Tables */
.table-wrap{overflow-x:auto;border:1px solid var(--border-light);border-radius:var(--radius);background:var(--white);box-shadow:0 1px 2px rgba(31,35,41,0.03)}
table{width:100%;border-collapse:collapse;font-size:13px}
table th,table td{text-align:left;padding:11px 16px;border-bottom:1px solid var(--border-light)}
table th{color:var(--text-sec);font-weight:500;font-size:12px;background:#F8FAFD;white-space:nowrap}
table tbody tr:last-child td{border-bottom:none}
table tbody tr:hover{background:#F7FAFF}
table a{color:var(--blue);text-decoration:none}
table a:hover{text-decoration:underline}

/* Stats */
.summary-row{display:flex;gap:12px;margin-bottom:18px}
.stat-card{background:linear-gradient(180deg,#FFFFFF 0%,#FAFCFF 100%);border-radius:var(--radius);border:1px solid var(--border-light);padding:16px;text-align:center;flex:1;box-shadow:var(--shadow-sm)}
.stat-card .stat-val{font-size:24px;font-weight:600;margin-top:6px;letter-spacing:-0.5px}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-green{background:var(--green-light);color:var(--green)}
.tag-red{background:var(--red-light);color:var(--red)}
.tag-orange{background:var(--orange-light);color:var(--orange)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:white;border-radius:12px;padding:28px;min-width:400px;max-width:540px;box-shadow:0 8px 40px rgba(0,0,0,0.12);max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text);letter-spacing:-0.2px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Bottom bar */
#bottom-bar{display:flex;align-items:center;padding:0 20px;background:var(--white);border-top:1px solid var(--border-light);font-size:11px;flex-shrink:0;height:32px}
#bottom-status{color:var(--text-third)}

/* Page title */
.page-title{font-size:18px;font-weight:600;margin-bottom:20px;color:var(--text);letter-spacing:-0.3px}
.page-title::after{content:"";display:block;width:28px;height:3px;background:var(--blue);border-radius:2px;margin-top:10px}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-third)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.3}
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <span id="app-title"></span>
    <div class="section-tab active" onclick="switchSection('basic')" id="tab-basic"></div>
    <div class="section-tab" onclick="switchSection('rent')" id="tab-rent"></div>
    <div class="spacer"></div>
  </div>

  <div id="content">
    <div class="section-page active" id="section-basic">
      <div id="sidebar">
        <div class="side-item active" onclick="switchSide('buildings')" id="side-buildings"></div>
        <div class="side-item" onclick="switchSide('rooms')" id="side-rooms"></div>
        <div class="side-item" onclick="switchSide('tenants')" id="side-tenants"></div>
        <div class="side-item" onclick="switchSide('contracts')" id="side-contracts"></div>
        <div class="side-item" onclick="switchSide('water')" id="side-water"></div>
        <div class="side-item" onclick="switchSide('electric')" id="side-electric"></div>
      </div>
      <div id="main-content"></div>
    </div>

    <div class="section-page" id="section-rent">
      <div id="sidebar-rent">
        <div class="side-item active" onclick="switchSideRent('bills')" id="side-bills"></div>
        <div class="side-item" onclick="switchSideRent('payments')" id="side-payments"></div>
      </div>
      <div id="main-content-rent"></div>
    </div>
  </div>

  <div id="bottom-bar"><span id="bottom-status"></span></div>
</div>

<script>
var API = 'http://127.0.0.1:18520';
function S(id, text) { document.getElementById(id).textContent = text; }
function initLabels() {
  S('app-title', '\u79df\u623f\u7ba1\u7406\u7cfb\u7edf');
  S('tab-basic', '\u57fa\u7840\u4fe1\u606f');
  S('tab-rent', '\u6536\u79df\u7ba1\u7406');
  S('side-buildings', '\u697c\u680b\u4fe1\u606f');
  S('side-rooms', '\u623f\u95f4\u4fe1\u606f');
  S('side-tenants', '\u79df\u5ba2\u4fe1\u606f');
  S('side-contracts', '\u5408\u540c\u4fe1\u606f');
  S('side-water', '\u6c34\u8868\u4fe1\u606f');
  S('side-electric', '\u7535\u8868\u4fe1\u606f');
  S('side-bills', '\u8d26\u5355\u7ba1\u7406');
  S('side-payments', '\u6536\u6b3e\u8bb0\u5f55');
  S('bottom-status', '\u5df2\u5c31\u7eea');
}
async function api(path, opts) {
  if (!opts) opts = {};
  try {
    var r = await fetch(API + path, { method: opts.method || 'GET', headers: opts.body ? {'Content-Type':'application/json'} : {}, body: opts.body });
    return await r.json();
  } catch (e) { return null; }
}
async function rental(table, action, data) {
  return await api('/api/rental', { method: 'POST', body: JSON.stringify({table: table, action: action, data: data || {}}) });
}
function showModal(html) {
  closeModal();
  var o = document.createElement('div');
  o.className = 'modal-overlay'; o.id = '_modal';
  o.innerHTML = '<div class="modal" onclick="event.stopPropagation()">' + html + '</div>';
  o.onclick = closeModal;
  document.body.appendChild(o);
}
function closeModal() { var m = document.getElementById('_modal'); if (m) m.remove(); }
function M(h) { showModal(h); }
function CM() { closeModal(); }
var currentSection = 'basic';
function switchSection(name) {
  document.querySelectorAll('.section-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.section-page').forEach(function(p){ p.classList.remove('active'); });
  if (name == 'basic') { document.getElementById('tab-basic').classList.add('active'); document.getElementById('section-basic').classList.add('active'); switchSide('buildings'); }
  else { document.getElementById('tab-rent').classList.add('active'); document.getElementById('section-rent').classList.add('active'); switchSideRent('bills'); }
  currentSection = name;
}
var currentSide = 'buildings';
function switchSide(name) {
  document.querySelectorAll('#sidebar .side-item').forEach(function(s){ s.classList.remove('active'); });
  var map = {buildings:'side-buildings', rooms:'side-rooms', tenants:'side-tenants', contracts:'side-contracts', water:'side-water', electric:'side-electric'};
  document.getElementById(map[name]).classList.add('active');
  currentSide = name;
  if (name == 'buildings') loadBuildings(); else if (name == 'rooms') loadRooms(); else if (name == 'tenants') loadTenants(); else if (name == 'contracts') loadContracts(); else if (name == 'water') loadWaterMeters(); else loadElectricMeters();
}
var currentSideRent = 'bills';
function switchSideRent(name) {
  document.querySelectorAll('#sidebar-rent .side-item').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(name == 'bills' ? 'side-bills' : 'side-payments').classList.add('active');
  currentSideRent = name;
  if (name == 'bills') loadBills(); else loadPayments();
}
function renderMain(html) { if (currentSection == 'basic') document.getElementById('main-content').innerHTML = html; else document.getElementById('main-content-rent').innerHTML = html; }
function esc(v) { return String(v == null ? '' : v).replace(/[&<>'"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]; }); }
var buildingQuery = '';
var currentRoomBuildingId = null;
var currentTenantBuildingId = null;
async function loadBuildings() {
  var blds = await rental('buildings','list') || [];
  var rooms = await rental('rooms','list') || [];
  var roomCount = {};
  rooms.forEach(function(r){ roomCount[r.building_id] = (roomCount[r.building_id] || 0) + 1; });
  var q = buildingQuery.trim().toLowerCase();
  var shown = q ? blds.filter(function(b){
    return String(b.name || '').toLowerCase().indexOf(q) >= 0 || String(b.address || '').toLowerCase().indexOf(q) >= 0;
  }) : blds;
  var h = '<div class="toolbar"><button class="btn btn-primary btn-sm" onclick="showAddBuilding()">+ \u6dfb\u52a0\u697c\u680b</button><input class="soft-input" id="building_query" value="'+esc(buildingQuery)+'" placeholder="\u8f93\u5165\u540d\u79f0\u6216\u5730\u5740\u67e5\u8be2" style="width:220px;height:32px"><button class="btn btn-outline btn-sm" onclick="queryBuildings()">\u67e5\u8be2</button></div><div class="toolbar-divider"></div>';
  if (blds.length == 0) h += '<div class="empty-state"><div class="icon">&#x1F3E2;</div><div>\u6682\u65e0\u697c\u680b\uff0c\u70b9\u51fb\u4e0a\u65b9\u6309\u94ae\u6dfb\u52a0</div></div>';
  else if (shown.length == 0) h += '<div class="empty-state"><div class="icon">&#x1F50D;</div><div>\u6ca1\u6709\u627e\u5230\u5339\u914d\u7684\u697c\u680b</div></div>';
  else {
    h += '<div class="table-wrap"><table><thead><tr><th>\u540d\u79f0</th><th>\u5730\u5740</th><th>\u623f\u95f4\u6570</th></tr></thead><tbody>';
    shown.forEach(function(b){ h += '<tr><td><span class="name-link" onclick="editBuilding('+Number(b.id)+')">'+esc(b.name)+'</span></td><td>'+esc(b.address||'')+'</td><td>'+(roomCount[b.id]||0)+' \u95f4</td></tr>'; });
    h += '</tbody></table></div>';
  }
  h += '<div class="list-meta">\u5171 '+shown.length+' / '+blds.length+' \u680b\u697c</div>';
  renderMain(h);
}
function queryBuildings() { var el = document.getElementById('building_query'); buildingQuery = el ? el.value : ''; loadBuildings(); }
function showAddBuilding() { M('<div class="soft-form"><div class="form-group"><label>\u540d\u79f0</label><input class="soft-input" id="f_bname" placeholder="\u5982\uff1aA\u680b"></div><div class="form-group"><label>\u5730\u5740</label><input class="soft-input" id="f_baddr" placeholder="\u5982\uff1aXX\u8defXX\u53f7"></div><div class="modal-actions"><button class="btn btn-outline" onclick="CM()">\u53d6\u6d88</button><button class="btn btn-primary" onclick="doAddBuilding()">\u6dfb\u52a0</button></div></div>'); }
function doAddBuilding() { var n = document.getElementById('f_bname').value.trim(); if (!n) { alert('\u8bf7\u8f93\u5165\u697c\u680b\u540d\u79f0'); return; } rental('buildings','add',{name:n, address:document.getElementById('f_baddr').value.trim()}).then(function(res){ if (!res || res.error) { alert((res && res.error) || '\u65b0\u589e\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u540e\u7aef\u670d\u52a1'); return; } CM(); loadBuildings(); }); }
async function editBuilding(id) {
  var b = await rental('buildings','get',{id:id});
  if (!b || b.error) { alert('\u672a\u627e\u5230\u8be5\u697c\u680b'); return; }
  M('<div class="modal-title">\u7f16\u8f91\u697c\u680b</div><div class="soft-form"><div class="form-group"><label>\u540d\u79f0</label><input class="soft-input" id="f_bname" value="'+esc(b.name)+'"></div><div class="form-group"><label>\u5730\u5740</label><input class="soft-input" id="f_baddr" value="'+esc(b.address||'')+'"></div><div class="modal-actions"><button class="btn btn-outline" onclick="CM()">\u53d6\u6d88</button><button class="btn btn-primary" onclick="doUpdateBuilding('+Number(id)+')">\u4fdd\u5b58</button></div></div>');
}
function doUpdateBuilding(id) { var n = document.getElementById('f_bname').value.trim(); if (!n) { alert('\u8bf7\u8f93\u5165\u697c\u680b\u540d\u79f0'); return; } rental('buildings','update',{id:id, name:n, address:document.getElementById('f_baddr').value.trim()}).then(function(res){ if (!res || res.error) { alert((res && res.error) || '\u4fdd\u5b58\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u540e\u7aef\u670d\u52a1'); return; } CM(); loadBuildings(); }); }
async function loadRooms() {
  var buildings = await rental('buildings','list') || [];
  if (buildings.length == 0) {
    currentRoomBuildingId = null;
    renderMain('<div class="toolbar"><button class="btn btn-primary btn-sm" onclick="switchSide(&quot;buildings&quot;)">+ \u5148\u6dfb\u52a0\u697c\u680b</button></div><div class="toolbar-divider"></div><div class="empty-state"><div class="icon">&#x1F3E0;</div><div>\u8bf7\u5148\u6dfb\u52a0\u697c\u680b\uff0c\u518d\u5f55\u5165\u623f\u95f4</div></div>');
    return;
  }
  if (!currentRoomBuildingId || !buildings.some(function(b){ return Number(b.id) == Number(currentRoomBuildingId); })) currentRoomBuildingId = buildings[0].id;
  var rooms = await rental('rooms','list',{building_id:currentRoomBuildingId}) || [];
  var h = '<div class="tab-action-row"><div class="building-tabs">';
  buildings.forEach(function(b){
    var active = Number(b.id) == Number(currentRoomBuildingId) ? ' active' : '';
    h += '<button class="building-tab'+active+'" onclick="switchRoomBuilding('+Number(b.id)+')">'+esc(b.name)+'</button>';
  });
  h += '</div><button class="btn btn-primary btn-sm" onclick="showAddRoom()">+ \u6dfb\u52a0\u623f\u95f4</button></div>';

function roomStatusSwitch(selected) {

function toggleRoomStatus() {

async function showAddRoom() {
  var buildings = await rental('buildings','list') || [];
  if (buildings.length == 0) { alert('\u8bf7\u5148\u6dfb\u52a0\u697c\u680b'); return; }
  var selectedId = currentRoomBuildingId || buildings[0].id;
  M('<div class="soft-form"><div class="form-group"><label>\u6240\u5c5e\u697c\u680b</label>'+roomBuildingPicker(buildings, selectedId)+'</div><div class="form-group"><label>\u697c\u5c42</label><input class="soft-input" id="f_room_floor" type="number" value="1" min="-9" placeholder="\u5982\uff1a1"></div><div class="form-group"><label>\u623f\u95f4\u53f7</label><input class="soft-input" id="f_room_number" placeholder="\u5982\uff1a101"></div><div class="form-group"><label>\u72b6\u6001</label>'+roomStatusSwitch('idle')+'</div><div class="modal-actions"><button class="btn btn-outline" onclick="CM()">\u53d6\u6d88</button><button class="btn btn-primary" onclick="doAddRoom()">\u6dfb\u52a0</button></div></div>');
}
function doAddRoom() {
  var buildingId = document.getElementById('f_room_building').value;
  var floor = parseInt(document.getElementById('f_room_floor').value, 10);
  var roomNumber = document.getElementById('f_room_number').value.trim();
  var status = document.getElementById('f_room_status').value;
  if (isNaN(floor)) { alert('\u8bf7\u8f93\u5165\u697c\u5c42'); return; }
  if (!roomNumber) { alert('\u8bf7\u8f93\u5165\u623f\u95f4\u53f7'); return; }
  rental('rooms','add',{building_id:buildingId, floor:floor, room_number:roomNumber, status:status}).then(function(res){
    if (!res || res.error) { alert((res && res.error) || '\u65b0\u589e\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u540e\u7aef\u670d\u52a1'); return; }
    currentRoomBuildingId = buildingId; CM(); loadRooms();
  });
}
async function editRoom(id) {
  var room = await rental('rooms','get',{id:id});
  if (!room || room.error) { alert('\u672a\u627e\u5230\u8be5\u623f\u95f4'); return; }
  var buildings = await rental('buildings','list') || [];
  M('<div class="modal-title">\u7f16\u8f91\u623f\u95f4</div><div class="soft-form"><div class="form-group"><label>\u6240\u5c5e\u697c\u680b</label>'+roomBuildingPicker(buildings, room.building_id)+'</div><div class="form-group"><label>\u697c\u5c42</label><input class="soft-input" id="f_room_floor" type="number" value="'+esc(room.floor || 1)+'" min="-9"></div><div class="form-group"><label>\u623f\u95f4\u53f7</label><input class="soft-input" id="f_room_number" value="'+esc(room.room_number)+'"></div><div class="form-group"><label>\u72b6\u6001</label>'+roomStatusSwitch(room.status || 'idle')+'</div><div class="modal-actions"><button class="btn btn-outline" onclick="CM()">\u53d6\u6d88</button><button class="btn btn-primary" onclick="doUpdateRoom('+Number(id)+')">\u4fdd\u5b58</button></div></div>');
}
function doUpdateRoom(id) {
  var buildingId = document.getElementById('f_room_building').value;
  var floor = parseInt(document.getElementById('f_room_floor').value, 10);
  var roomNumber = document.getElementById('f_room_number').value.trim();
  var status = document.getElementById('f_room_status').value;
  if (isNaN(floor)) { alert('\u8bf7\u8f93\u5165\u697c\u5c42'); return; }
  if (!roomNumber) { alert('\u8bf7\u8f93\u5165\u623f\u95f4\u53f7'); return; }
  rental('rooms','update',{id:id, building_id:buildingId, floor:floor, room_number:roomNumber, status:status}).then(function(res){
    if (!res || res.error) { alert((res && res.error) || '\u4fdd\u5b58\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u540e\u7aef\u670d\u52a1'); return; }
    currentRoomBuildingId = buildingId; CM(); loadRooms();
  });
}
async function loadTenants() {
  var buildings = await rental('buildings','list') || [];
  if (buildings.length == 0) {
    currentTenantBuildingId = null;
    renderMain('<div class="toolbar"><button class="btn btn-primary btn-sm" onclick="switchSide(&quot;buildings&quot;)">+ \u5148\u6dfb\u52a0\u697c\u680b</button></div><div class="toolbar-divider"></div><div class="empty-state"><div class="icon">&#x1F464;</div><div>\u8bf7\u5148\u6dfb\u52a0\u697c\u680b\uff0c\u518d\u5f55\u5165\u79df\u5ba2</div></div>');
    return;
  }
  if (!currentTenantBuildingId || !buildings.some(function(b){ return Number(b.id) == Number(currentTenantBuildingId); })) currentTenantBuildingId = buildings[0].id;
  var tenants = await rental('tenants','list',{active_only:false, building_id:currentTenantBuildingId}) || [];
  var h = '<div class="tab-action-row"><div class="building-tabs">';
  buildings.forEach(function(b){
    var active = Number(b.id) == Number(currentTenantBuildingId) ? ' active' : '';
    h += '<button class="building-tab'+active+'" onclick="switchTenantBuilding('+Number(b.id)+')">'+esc(b.name)+'</button>';
  });
  h += '</div><button class="btn btn-primary btn-sm" onclick="showAddTenant()">+ \u6dfb\u52a0\u79df\u5ba2</button></div>';
  if (tenants.length == 0) h += '<div class="empty-state"><div class="icon">&#x1F464;</div><div>\u6682\u65e0\u79df\u5ba2\uff0c\u70b9\u51fb\u53f3\u4e0a\u65b9\u6309\u94ae\u6dfb\u52a0</div></div>';
  else {
    h += '<div class="table-wrap"><table><thead><tr><th>\u59d3\u540d</th><th>\u624b\u673a\u53f7</th><th>\u8bc1\u4ef6\u53f7</th><th class="status-cell">\u72b6\u6001</th></tr></thead><tbody>';
    tenants.forEach(function(t){
      var active = t.status != 'inactive';
      h += '<tr><td><span class="name-link" onclick="editTenant('+Number(t.id)+')">'+esc(t.name)+'</span></td><td>'+esc(t.phone||'')+'</td><td>'+esc(t.id_card||'')+'</td><td class="status-cell"><span class="status-dot '+(active ? 'rented' : 'idle')+'" title="'+(active ? '\u6b63\u5e38' : '\u505c\u7528')+'"></span></td></tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '<div class="list-meta">\u5171 '+tenants.length+' \u4f4d\u79df\u5ba2</div>';
  renderMain(h);
}
function switchTenantBuilding(id) { currentTenantBuildingId = id; loadTenants(); }
function tenantBuildingPicker(buildings, selectedId) {
  var selected = buildings.find(function(b){ return Number(b.id) == Number(selectedId); }) || buildings[0];
  if (!selected) return '';
  var h = '<input type="hidden" id="f_tenant_building" value="'+Number(selected.id)+'"><div class="custom-select" id="tenant_building_picker"><div class="select-trigger" onclick="toggleTenantBuildingMenu()"><span id="tenant_building_label">'+esc(selected.name)+'</span></div><div class="select-menu">';
  buildings.forEach(function(b){
    var active = Number(b.id) == Number(selected.id) ? ' active' : '';
    h += '<div class="select-option'+active+'" onclick="selectTenantBuildingFromPicker('+Number(b.id)+', this)">'+esc(b.name)+'</div>';
  });
  return h + '</div></div>';
}
function toggleTenantBuildingMenu() {
  var el = document.getElementById('tenant_building_picker');
  if (el) el.classList.toggle('open');
}
function selectTenantBuildingFromPicker(id, optionEl) {
  document.getElementById('f_tenant_building').value = id;
  document.getElementById('tenant_building_label').textContent = optionEl.textContent;
  var picker = document.getElementById('tenant_building_picker');
  if (picker) {
    picker.classList.remove('open');
    picker.querySelectorAll('.select-option').forEach(function(o){ o.classList.remove('active'); });
    optionEl.classList.add('active');
  }
}
function lockedTenantBuilding(buildings, selectedId) {
  var selected = buildings.find(function(b){ return Number(b.id) == Number(selectedId); }) || buildings[0];

function tenantStatusSwitch(selected) {
  var active = selected != 'inactive';
  return '<input type="hidden" id="f_tenant_status" value="'+(active ? 'active' : 'inactive')+'"><div class="status-switch-row"><button class="status-switch '+(active ? 'rented' : '')+'" id="tenant_status_switch" onclick="toggleTenantStatus()" type="button"></button><span class="status-switch-label" id="tenant_status_label">'+(active ? '\u6b63\u5e38' : '\u505c\u7528')+'</span></div>';
}
function toggleTenantStatus() {
  var input = document.getElementById('f_tenant_status');
  var sw = document.getElementById('tenant_status_switch');
  var label = document.getElementById('tenant_status_label');
  var active = input.value == 'inactive';
  input.value = active ? 'active' : 'inactive';
  sw.classList.toggle('rented', active);
  label.textContent = active ? '\u6b63\u5e38' : '\u505c\u7528';
}
async function showAddTenant() {
  var buildings = await rental('buildings','list') || [];
  if (buildings.length == 0) { alert('\u8bf7\u5148\u6dfb\u52a0\u697c\u680b'); return; }
  var selectedId = currentTenantBuildingId || buildings[0].id;
  M('<div class="soft-form"><div class="form-group"><label>\u6240\u5c5e\u697c\u680b</label>'+tenantBuildingPicker(buildings, selectedId)+'</div><div class="form-group"><label>\u59d3\u540d</label><input class="soft-input" id="f_tenant_name" placeholder="\u5982\uff1a\u5f20\u4e09"></div><div class="form-group"><label>\u624b\u673a\u53f7</label><input class="soft-input" id="f_tenant_phone" placeholder="\u5982\uff1a13800000000"></div><div class="form-group"><label>\u8bc1\u4ef6\u53f7</label><input class="soft-input" id="f_tenant_id_card" placeholder="\u8eab\u4efd\u8bc1\u6216\u5176\u4ed6\u8bc1\u4ef6"></div><div class="form-group"><label>\u72b6\u6001</label>'+tenantStatusSwitch('active')+'</div><div class="modal-actions"><button class="btn btn-outline" onclick="CM()">\u53d6\u6d88</button><button class="btn btn-primary" onclick="doAddTenant()">\u6dfb\u52a0</button></div></div>');
}
function doAddTenant() {
  var name = document.getElementById('f_tenant_name').value.trim();
  if (!name) { alert('\u8bf7\u8f93\u5165\u79df\u5ba2\u59d3\u540d'); return; }
  var buildingId = document.getElementById('f_tenant_building').value;
  rental('tenants','add',{building_id:buildingId, name:name, phone:document.getElementById('f_tenant_phone').value.trim(), id_card:document.getElementById('f_tenant_id_card').value.trim(), status:document.getElementById('f_tenant_status').value}).then(function(res){
    if (!res || res.error) { alert((res && res.error) || '\u65b0\u589e\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u540e\u7aef\u670d\u52a1'); return; }
    currentTenantBuildingId = buildingId; CM(); loadTenants();
  });
}
async function editTenant(id) {
  var t = await rental('tenants','get',{id:id});
  if (!t || t.error) { alert('\u672a\u627e\u5230\u8be5\u79df\u5ba2'); return; }
  var buildings = await rental('buildings','list') || [];
  var selectedId = currentTenantBuildingId || t.building_id || (buildings[0] && buildings[0].id);
  M('<div class="modal-title">\u7f16\u8f91\u79df\u5ba2</div><div class="soft-form"><div class="form-group"><label>\u6240\u5c5e\u697c\u680b</label>'+lockedTenantBuilding(buildings, selectedId)+'</div><div class="form-group"><label>\u59d3\u540d</label><input class="soft-input" id="f_tenant_name" value="'+esc(t.name)+'"></div><div class="form-group"><label>\u624b\u673a\u53f7</label><input class="soft-input" id="f_tenant_phone" value="'+esc(t.phone||'')+'"></div><div class="form-group"><label>\u8bc1\u4ef6\u53f7</label><input class="soft-input" id="f_tenant_id_card" value="'+esc(t.id_card||'')+'"></div><div class="form-group"><label>\u72b6\u6001</label>'+tenantStatusSwitch(t.status || 'active')+'</div><div class="modal-actions"><button class="btn btn-outline" onclick="CM()">\u53d6\u6d88</button><button class="btn btn-primary" onclick="doUpdateTenant('+Number(id)+')">\u4fdd\u5b58</button></div></div>');
}
function doUpdateTenant(id) {
  var name = document.getElementById('f_tenant_name').value.trim();
  if (!name) { alert('\u8bf7\u8f93\u5165\u79df\u5ba2\u59d3\u540d'); return; }
  var buildingId = document.getElementById('f_tenant_building').value;
  rental('tenants','update',{id:id, building_id:buildingId, name:name, phone:document.getElementById('f_tenant_phone').value.trim(), id_card:document.getElementById('f_tenant_id_card').value.trim(), status:document.getElementById('f_tenant_status').value}).then(function(res){
    if (!res || res.error) { alert((res && res.error) || '\u4fdd\u5b58\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u540e\u7aef\u670d\u52a1'); return; }
    currentTenantBuildingId = buildingId; CM(); loadTenants();
  });
}

async function loadElectricMeters() { var ms = await rental('meters','list') || []; ms = ms.filter(function(m){return m.type=='electric'}); renderMain('<div class="page-title">\u7535\u8868\u4fe1\u606f</div><div class="toolbar"><button class="btn btn-primary btn-sm">+ \u6dfb\u52a0\u7535\u8868</button><span style="font-size:12px;color:var(--text-sec);margin-left:12px">\u5171 '+ms.length+' \u4e2a\u7535\u8868</span></div><div class="empty-state"><div class="icon">&#x26A1;</div><div>\u7535\u8868\u5217\u8868\u5df2\u52a0\u8f7d</div></div>'); }
async function loadBills() { var bs = await rental('bills','list') || []; renderMain('<div class="page-title">\u8d26\u5355\u7ba1\u7406</div><div class="summary-row"><div class="stat-card"><div>\u672c\u6708\u8d26\u5355</div><div class="stat-val">'+bs.length+'</div></div></div><div class="empty-state"><div class="icon">&#x1F4CA;</div><div>\u8d26\u5355\u5217\u8868\u5df2\u52a0\u8f7d</div></div>'); }
async function loadPayments() { var ps = await rental('payments','list') || []; renderMain('<div class="page-title">\u6536\u6b3e\u8bb0\u5f55</div><div class="summary-row"><div class="stat-card"><div>\u6536\u6b3e\u7b14\u6570</div><div class="stat-val">'+ps.length+'</div></div></div><div class="empty-state"><div class="icon">&#x1F4B3;</div><div>\u6536\u6b3e\u8bb0\u5f55\u5df2\u52a0\u8f7d</div></div>'); }
initLabels();
loadBuildings();
</script>
